<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jean find my Job</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">
        <span class="logo-jean">Jean</span> <span class="logo-job">find my Job</span>
      </h1>
    </header>

    <!-- Zone affichee quand l'utilisateur n'est pas connecte -->
    <section id="zone-login" class="zone">
      <h2 class="zone-title">Connecte-toi</h2>
      <p class="zone-subtitle">Avec ton compte Jean find my Job</p>

      <form id="login-form" class="form" novalidate>
        <label class="field">
          <span class="field-label">Email</span>
          <input
            type="email"
            id="email"
            class="field-input"
            autocomplete="email"
            required
          >
        </label>

        <label class="field">
          <span class="field-label">Mot de passe</span>
          <input
            type="password"
            id="password"
            class="field-input"
            autocomplete="current-password"
            required
          >
        </label>

        <p id="error-msg" class="error hidden"></p>

        <button type="submit" id="submit-btn" class="btn btn-primary">
          Se connecter
        </button>
      </form>

      <p class="signup-link">
        Pas encore de compte ?
        <a href="#" id="signup-link" class="link">Crée-le sur jeanfindmyjob.fr</a>
      </p>
    </section>

    <!-- Zone affichee quand l'utilisateur est connecte -->
    <section id="zone-account" class="zone hidden">
      <p class="hello">Bonjour</p>
      <p id="user-email" class="user-email"></p>

      <button type="button" id="open-jean-btn" class="btn btn-primary">
        Ouvrir Jean find my Job
      </button>

      <button type="button" id="logout-btn" class="btn btn-secondary">
        Se deconnecter
      </button>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
